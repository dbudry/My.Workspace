# Shared Build & Test — called by pr / development / master workflows.
# Not triggered on its own.

name: Build & Test

on:
  workflow_call:

env:
  DefaultConnection: Server=localhost,14333;Database=MyWorkspace_Dev;User Id=sa;Password=DevSql!Passw0rd2026;TrustServerCertificate=True;MultipleActiveResultSets=true

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: DevSql!Passw0rd2026
        ports:
          - 14333:1433
        options: >-
          --health-cmd "(/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'DevSql!Passw0rd2026' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'DevSql!Passw0rd2026' -Q 'SELECT 1')"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 40s

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore NuGet packages
        run: dotnet restore My.Workspace.sln

      - name: Build solution (Release)
        run: dotnet build My.Workspace.sln --no-restore --configuration Release

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply database migrations
        run: dotnet ef database update --project My.DAL/My.DAL.csproj --startup-project My.AzureFunction/My.AzureFunction.csproj --configuration Release
        env:
          DefaultConnection: ${{ env.DefaultConnection }}

      - name: Run tests
        run: dotnet test My.Workspace.sln --no-build --configuration Release --verbosity normal
        env:
          DefaultConnection: ${{ env.DefaultConnection }}
